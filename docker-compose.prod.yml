# Creator Engine — compose de produção (VPS romulohub.cloud).
# Espelha sua stack real: postgres (pgvector) + creator-engine-api (Next.js)
# nas redes creator-internal (interna) e traefik-proxy (externa do Traefik).
#
# O serviço "postgres" é o SEU atual (mantido como referência). Se ele já roda
# por outra compose, você pode usar SÓ o bloco "creator-engine-api" abaixo,
# colando-o no lugar do creator-engine-api antigo (Streamlit).
#
# Mudanças vs. o creator-engine-api antigo (propositais, para Next.js):
#   • porta 8501 → 3000
#   • SEM stripprefix: o basePath do Next já serve sob /creator-engine
#     (stripprefix quebraria os assets /_next)
#   • SEM bind-mount de /app: a imagem standalone já contém o build
services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: romulo_db_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: personal_db
    ports:
      - "127.0.0.1:5432:5432"   # acesso local (DBeaver/psql no host) — não expõe na internet
    volumes:
      - /srv/data/postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - creator-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U romulo_db_user -d personal_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  creator-engine-api:
    image: ghcr.io/romulotimbo/creator-engine-api:${CREATOR_ENGINE_IMAGE_TAG:-latest}
    container_name: creator-engine-api
    restart: unless-stopped
    # Variáveis montadas aqui mesmo. POSTGRES_PASSWORD/ENCRYPTION_KEY
    # vêm do .env ao lado desta compose (o mesmo que já tem POSTGRES_PASSWORD).
    environment:
      DATABASE_URL: "postgresql://romulo_db_user:${POSTGRES_PASSWORD}@postgres:5432/personal_db?schema=creator_engine"
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      NODE_ENV: production
      # Email do usuário Authelia usado para vincular registros (opcional se Remote-Email vier no header).
      AUTH_EMAIL_DOMAIN: ${AUTH_EMAIL_DOMAIN:-}
      AUTHELIA_LOGOUT_URL: ${AUTHELIA_LOGOUT_URL:-}
      # Volume compartilhado com o worker de render (ingestão/scan/upload de fontes).
      ESTUDIO_DATA_DIR: /data/estudio
      # Publicação Instagram (n8n ↔ Zernio)
      N8N_PUBLISH_TOKEN: ${N8N_PUBLISH_TOKEN}
      PUBLICACAO_DATA_DIR: /data/publicacao
      PUBLICACAO_MEDIA_BASE_URL: ${PUBLICACAO_MEDIA_BASE_URL:-https://romulohub.cloud/creator-engine/api/publicacao/media}
      # Curadoria DMs Instagram (Postgres n8n — usuário ce_dm_curator)
      N8N_POSTGRES_URL: ${N8N_POSTGRES_URL}
    volumes:
      - estudio-data:/data/estudio
      - publicacao-data:/data/publicacao
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - creator-internal                        # alcança o "postgres"
      - traefik-proxy                           # exposição via Traefik
      - n8n-net                                 # alcança n8n-postgres (curadoria DMs)
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/creator-engine/').then(r=>process.exit(r.ok||r.status===302?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-proxy"
      - "traefik.http.routers.creator-engine.rule=Host(`romulohub.cloud`) && PathPrefix(`/creator-engine`)"
      - "traefik.http.routers.creator-engine.entrypoints=websecure"
      - "traefik.http.routers.creator-engine.tls.certresolver=letsencrypt"
      - "traefik.http.services.creator-engine.loadbalancer.server.port=3000"
      # Autenticação na borda via Authelia (forward auth). O middleware authelia@docker
      # deve estar definido no container do Authelia na rede traefik-proxy.
      - "traefik.http.routers.creator-engine.middlewares=authelia@docker"
      # Rotas /api/publicacao autenticadas por X-Publish-Token (app) — sem Authelia na borda
      # (Zernio precisa buscar mídia; n8n chama fila/callbacks sem sessão).
      - "traefik.http.routers.creator-engine-publicacao.rule=Host(`romulohub.cloud`) && PathPrefix(`/creator-engine/api/publicacao`)"
      - "traefik.http.routers.creator-engine-publicacao.entrypoints=websecure"
      - "traefik.http.routers.creator-engine-publicacao.tls.certresolver=letsencrypt"
      - "traefik.http.routers.creator-engine-publicacao.service=creator-engine"
      - "traefik.http.routers.creator-engine-publicacao.priority=100"
      # NÃO usar stripprefix com Next.js (basePath já cuida do subpath).

  # Schema sync (one-off): docker compose -f docker-compose.prod.yml run --rm migrate
  # Imagem -migrate = estágio "builder" (prisma + schema), publicada no GHCR pela CI.
  # Creator Engine não usa prisma migrate; em prod o padrão do projeto é `db push`
  # (com SQL idempotente em prisma/sql/ como fallback manual).
  migrate:
    image: ghcr.io/romulotimbo/creator-engine-migrate:${CREATOR_ENGINE_IMAGE_TAG:-latest}
    profiles: ["tools"]
    environment:
      DATABASE_URL: "postgresql://romulo_db_user:${POSTGRES_PASSWORD}@postgres:5432/personal_db?schema=creator_engine"
    networks:
      - creator-internal
    command: npx prisma db push --skip-generate

  # Worker de render da esteira de estilização (Remotion + FFmpeg + ExifTool).
  # Consome a fila JobRender no Postgres (polling FOR UPDATE SKIP LOCKED) e grava
  # os MP4 finais em /data/estudio/output. Não é exposto pelo Traefik.
  creator-engine-render:
    image: ghcr.io/romulotimbo/creator-engine-render:${CREATOR_ENGINE_IMAGE_TAG:-latest}
    container_name: creator-engine-render
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://romulo_db_user:${POSTGRES_PASSWORD}@postgres:5432/personal_db?schema=creator_engine"
      ESTUDIO_DATA_DIR: /data/estudio
      ESTUDIO_STATIC_PORT: "4599"
      ESTUDIO_POLL_MS: "4000"
      NODE_ENV: production
    volumes:
      - estudio-data:/data/estudio
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - creator-internal
    # Render é pesado (Chromium headless): limita recursos e concorrência (1 job)
    # para não competir com a app/hermes/postgres na VPS.
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2g

networks:
  creator-internal:
    name: creator-internal
    external: true
  traefik-proxy:
    external: true
    name: traefik-proxy
  n8n-net:
    external: true
    name: n8n_n8n-net

volumes:
  # I/O de vídeo da esteira (fontes/assets/output). Compartilhado app ⇄ worker.
  estudio-data:
    name: creator-engine-estudio-data
  publicacao-data:
    name: creator-engine-publicacao-data
