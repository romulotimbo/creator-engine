name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    permissions:
      contents: read
      packages: write
    uses: romulotimbo/ci/.github/workflows/deploy.yml@main
    with:
      app: creator-engine
      deploy_dir: /srv/data/creator-engine-api
      compose_file: docker-compose.prod.yml
      migrate_service: migrate
      # não tocar no serviço 'postgres' (banco compartilhado) durante o deploy
      services: "creator-engine-api creator-engine-render"
      images: >-
        [
          {"suffix":"-api","dockerfile":"Dockerfile","context":".","build_args":"","target":""},
          {"suffix":"-render","dockerfile":"Dockerfile.render","context":".","build_args":"","target":""},
          {"suffix":"-migrate","dockerfile":"Dockerfile","context":".","build_args":"","target":"builder"}
        ]
    secrets: inherit
